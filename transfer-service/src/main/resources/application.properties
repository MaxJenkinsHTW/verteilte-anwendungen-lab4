quarkus.kafka.devservices.enabled=false
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}


quarkus.http.port=${QUARKUS_HTTP_PORT:8084}

# Database Configuration (supports both H2 for local dev and PostgreSQL for Docker)
quarkus.datasource.db-kind=${QUARKUS_DATASOURCE_DB_KIND:postgresql}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:transferuser}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:transferpass}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/transferdb}

# Connection pool settings
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.packages=de.berlin.htw.entity

# Liquibase Configuration
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.validate-on-migrate=false

# Valid Transactions In
mp.messaging.incoming.valid-transactions-in.connector=smallrye-kafka
mp.messaging.incoming.valid-transactions-in.topic=valid-transactions
mp.messaging.incoming.valid-transactions-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.valid-transactions-in.group.id=${KAFKA_CONSUMER_GROUP_ID:transfer-service-group}





