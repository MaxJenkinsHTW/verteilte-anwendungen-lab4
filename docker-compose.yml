version: "3.8"

services:
  kafka-broker:
    image: apache/kafka:latest

    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka-broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - banking-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka-broker
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: va-lab4
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092
    networks:
      - banking-network

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      - kafka-broker
    command: >
      /bin/sh -c "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --list; do sleep 2; done &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --create --if-not-exists --topic raw-transactions --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --create --if-not-exists --topic valid-transactions --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --create --if-not-exists --topic fraud-alerts --partitions 3 --replication-factor 1
      "
    networks:
      - banking-network

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: transaction-service
    ports:
      - "8081:8081"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8081
    networks:
      - banking-network

  fraud-alert-service:
    build:
      context: ./fraud-alert-service
      dockerfile: Dockerfile
    container_name: fraud-alert-service
    ports:
      - "8083:8083"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8083
    networks:
      - banking-network

  postgres:
    image: postgres:15-alpine
    container_name: transfer-db
    environment:
      POSTGRES_DB: transferdb
      POSTGRES_USER: transferuser
      POSTGRES_PASSWORD: transferpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transferuser -d transferdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8085
    networks:
      - banking-network

  transfer-service-1:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service-1
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8084
      KAFKA_CONSUMER_GROUP_ID: transfer-service-group
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: transferuser
      QUARKUS_DATASOURCE_PASSWORD: transferpass
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/transferdb
    networks:
      - banking-network

  transfer-service-2:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service-2
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8086
      KAFKA_CONSUMER_GROUP_ID: transfer-service-group
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: transferuser
      QUARKUS_DATASOURCE_PASSWORD: transferpass
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/transferdb
    networks:
      - banking-network

  transfer-service-3:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service-3
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      QUARKUS_HTTP_PORT: 8087
      KAFKA_CONSUMER_GROUP_ID: transfer-service-group
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: transferuser
      QUARKUS_DATASOURCE_PASSWORD: transferpass
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/transferdb
    networks:
      - banking-network

volumes:
  postgres-data:

networks:
  banking-network:
    driver: bridge
